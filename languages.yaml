en:
  PLUGIN_SECRET_SPLIT:
    DESCRIPTION: Store selected plugin secrets outside config YAML files
    ENABLED: Enabled
    ENABLED_OPTION: Enabled
    DISABLED_OPTION: Disabled
    DEBUG_LOGGING: Debug logging
    DEBUG_LOGGING_HELP: Write Secret Split debug entries into the Grav log.
    BASE_STORAGE_FILE: Base storage file
    ENVIRONMENT_STORAGE_PATTERN: Environment storage pattern
    PROTECTED_PLUGINS: Protected plugins
    ADD_PLUGIN: Add plugin
    PLUGIN: Plugin
    PROTECTED_FIELDS: Protected fields
    ADD_FIELD: Add field
    FIELD: Field
    LABEL_CONTEXT:
      SITE: Site
      ADMIN: Admin
    STATUS:
      TITLE: Status
      STORED: Stored
      PENDING: Pending
      DUPLICATE: Duplicated
      MISSING: Missing
    SOURCE:
      BASE_SECRETS: Secrets file
      ENV_SECRETS: Environment secrets file
      BASE_CONFIG: Config
      ENV_CONFIG: Environment config
      NOT_SET: Not set
      DUPLICATE: "%tracked% config, %secrets% secrets file"
    OVERVIEW:
      STORED: Stored
      PENDING: Pending
      DUPLICATE: Duplicated
      MISSING: Missing
      MIGRATE_TO_FILE: Move to %file%
      NOTE_TO_FILE: Pending and duplicate values will be moved into %file% and removed from config YAML after you save this form.
      RETURN_TO_CONFIG: Move to config
      RETURN_NOTE_FROM_FILE: Current values from %file% will be written back into config YAML and removed from %file% after you save this form.
      SAVE_FIRST_NOTE: Save this form to apply the selected migrate or return action.
    MESSAGES:
      INVALID_TOKEN: Invalid security token.
      MIGRATED: "Secret Split moved %migrated% pending fields%duplicates%."
      RETURNED: "Secret Split moved %returned% stored values back into config."
      ACTION_FAILED: "Secret Split action failed: %error%."
      DUPLICATE_SUFFIX: " and %normalized% duplicated fields"

ru:
  PLUGIN_SECRET_SPLIT:
    DESCRIPTION: Хранит выбранные секреты плагинов вне config YAML-файлов
    ENABLED: Включен
