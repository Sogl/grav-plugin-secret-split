    BASE_STORAGE_FILE: Базовый файл секретов
    ENVIRONMENT_STORAGE_PATTERN: Шаблон env-файла секретов
    PROTECTED_PLUGINS: Защищаемые плагины
    ADD_PLUGIN: Добавить плагин
    PLUGIN: Плагин
    PROTECTED_FIELDS: Защищаемые поля
    ADD_FIELD: Добавить поле
    FIELD: Поле
    LABEL_CONTEXT:
      SITE: Site
      ADMIN: Admin
    STATUS:
      TITLE: Статус
      STORED: Хранится
      PENDING: Ожидает
      DUPLICATE: Дублируется
      MISSING: Не задано
    SOURCE:
      BASE_SECRETS: Secrets-файл
      ENV_SECRETS: Env secrets-файл
      BASE_CONFIG: Config
      ENV_CONFIG: Env config
      NOT_SET: Не задано
      DUPLICATE: "%tracked% config, %secrets% secrets-файл"
    OVERVIEW:
      STORED: Хранится
      PENDING: Ожидает
      DUPLICATE: Дублируется
      MISSING: Не задано
